services:
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama-kortex4
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama:z
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    security_opt:
      - seccomp=unconfined
    group_add:
      - "39"
      - "105"
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
      - OLLAMA_VULKAN=1
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2 && ollama pull nomic-embed-text && wait"]
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: kortex-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
      - ALLOW_RESET=true
    restart: unless-stopped

  kortex-api:
    build: ./kortex-api
    container_name: kortex-api
    ports:
      - "8080:8080"
    volumes:
      - kortex_api_data:/app/data
      - ${HOME}:/home/user:rw
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - EMBED_MODEL=nomic-embed-text
      - CHAT_MODEL=llama3.2
      - HOST_HOME=${HOME}
      - CONTAINER_HOME=/home/user
      - DATA_DIR=/app/data
    depends_on:
      - ollama
      - chromadb
    restart: unless-stopped

  kortex-ui:
    image: nginx:alpine
    container_name: kortex-ui
    ports:
      - "3001:80"
    volumes:
      - ./kortex-ui:/usr/share/nginx/html:ro
      - ./kortex-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kortex-api
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data:z
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  chromadb_data:
  kortex_api_data:
  open_webui_data:
